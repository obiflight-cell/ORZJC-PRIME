<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1B3A6B"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </radialGradient>

    <!-- Gold shimmer gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e8c99a"/>
      <stop offset="30%"  stop-color="#C49A6C"/>
      <stop offset="60%"  stop-color="#f0d9b0"/>
      <stop offset="100%" stop-color="#8B5E3C"/>
    </linearGradient>

    <!-- Subtle gold for secondary elements -->
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C49A6C"/>
      <stop offset="50%"  stop-color="#e8c99a"/>
      <stop offset="100%" stop-color="#C49A6C"/>
    </linearGradient>

    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#C49A6C" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#8B5E3C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C49A6C" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Text glow -->
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="circle">
      <circle cx="200" cy="200" r="196"/>
    </clipPath>
  </defs>

  <!-- Circular clip for DP use -->
  <circle cx="200" cy="200" r="200" fill="#0A1628"/>

  <!-- Background fill -->
  <circle cx="200" cy="200" r="196" fill="url(#bgGrad)"/>

  <!-- Subtle inner texture rings -->
  <circle cx="200" cy="200" r="175" fill="none" stroke="#C49A6C" stroke-width="0.4" stroke-opacity="0.12"/>
  <circle cx="200" cy="200" r="155" fill="none" stroke="#C49A6C" stroke-width="0.3" stroke-opacity="0.08"/>

  <!-- Outer decorative ring -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="url(#ringGrad)" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="185" fill="none" stroke="url(#ringGrad)" stroke-width="0.5" stroke-opacity="0.5"/>

  <!-- ─── Crown / Trophy emblem ─── -->
  <!-- Crown base bar -->
  <rect x="152" y="118" width="96" height="8" rx="2" fill="url(#goldGrad)"/>

  <!-- Crown left spike -->
  <polygon points="152,118 163,82 174,118" fill="url(#goldGrad)"/>
  <!-- Crown centre spike (tallest) -->
  <polygon points="182,118 200,68 218,118" fill="url(#goldGrad)"/>
  <!-- Crown right spike -->
  <polygon points="226,118 237,82 248,118" fill="url(#goldGrad)"/>

  <!-- Crown jewels -->
  <circle cx="163" cy="84" r="5" fill="#e8c99a" filter="url(#textGlow)"/>
  <circle cx="200" cy="70" r="6" fill="#f0d9b0" filter="url(#textGlow)"/>
  <circle cx="237" cy="84" r="5" fill="#e8c99a" filter="url(#textGlow)"/>

  <!-- Small diamond centre jewel -->
  <polygon points="200,60 205,70 200,80 195,70" fill="url(#goldGrad)" filter="url(#textGlow)"/>

  <!-- Crown arch base -->
  <rect x="148" y="126" width="104" height="6" rx="3" fill="url(#goldGrad)" opacity="0.7"/>

  <!-- Thin separator line -->
  <line x1="90" y1="152" x2="310" y2="152" stroke="url(#goldLight)" stroke-width="0.6" stroke-opacity="0.4"/>

  <!-- ─── ORZJC wordmark ─── -->
  <text
    x="200"
    y="215"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="62"
    font-weight="700"
    letter-spacing="8"
    fill="url(#goldGrad)"
    filter="url(#textGlow)"
  >ORZJC</text>

  <!-- Thin divider lines flanking PRIME -->
  <line x1="90"  y1="235" x2="148" y2="235" stroke="url(#goldLight)" stroke-width="0.8" stroke-opacity="0.6"/>
  <line x1="252" y1="235" x2="310" y2="235" stroke="url(#goldLight)" stroke-width="0.8" stroke-opacity="0.6"/>

  <!-- ─── PRIME label ─── -->
  <text
    x="200"
    y="248"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18"
    font-weight="400"
    letter-spacing="12"
    fill="url(#goldLight)"
    opacity="0.9"
  >PRIME</text>

  <!-- Bottom ornament line -->
  <line x1="120" y1="268" x2="280" y2="268" stroke="url(#goldLight)" stroke-width="0.6" stroke-opacity="0.35"/>

  <!-- ─── Tagline ─── -->
  <text
    x="200"
    y="290"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="9.5"
    font-weight="400"
    letter-spacing="3.5"
    fill="#C49A6C"
    opacity="0.65"
  >AWARD-WINNING LUXURY TRAVEL</text>

  <!-- ─── Bottom corner flourishes ─── -->
  <!-- Left flourish -->
  <path d="M 100 330 Q 120 320 140 330" fill="none" stroke="url(#goldLight)" stroke-width="0.8" stroke-opacity="0.4"/>
  <circle cx="100" cy="330" r="2" fill="#C49A6C" opacity="0.5"/>
  <circle cx="140" cy="330" r="2" fill="#C49A6C" opacity="0.5"/>

  <!-- Right flourish -->
  <path d="M 260 330 Q 280 320 300 330" fill="none" stroke="url(#goldLight)" stroke-width="0.8" stroke-opacity="0.4"/>
  <circle cx="260" cy="330" r="2" fill="#C49A6C" opacity="0.5"/>
  <circle cx="300" cy="330" r="2" fill="#C49A6C" opacity="0.5"/>

  <!-- Centre dot -->
  <circle cx="200" cy="330" r="2.5" fill="#C49A6C" opacity="0.6"/>

  <!-- Est. label -->
  <text
    x="200"
    y="356"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="8"
    letter-spacing="4"
    fill="#C49A6C"
    opacity="0.45"
  >EST. 2024</text>
</svg>
